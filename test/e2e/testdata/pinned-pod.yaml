apiVersion: v1
kind: Pod
metadata:
  name: kore-e2e-pinned
  annotations:
    kore.zjusct.io/pin: "true"
    kore.zjusct.io/numa-policy: "single"
spec:
  restartPolicy: Never
  containers:
  - name: app
    image: busybox:1.36
    command: ["sleep", "3600"]
    resources:
      requests: { cpu: "2", memory: "64Mi" }
      limits: { cpu: "2", memory: "64Mi" }
