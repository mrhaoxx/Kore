# 若集群装了 cert-manager：apply certificate.yaml 后 CA 自动注入。
# 没有 cert-manager：跑 deploy/operator/gen-certs.sh 自签并注入 caBundle。
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kore-mutate
  annotations:
    cert-manager.io/inject-ca-from: kore-system/kore-webhook
webhooks:
- name: mutate.kore.zjusct.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Ignore      # spec §6：webhook 挂了不阻塞集群，agent 有二次校验
  clientConfig:
    service:
      name: kore-webhook
      namespace: kore-system
      path: /mutate-pod
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kore-validate
  annotations:
    cert-manager.io/inject-ca-from: kore-system/kore-webhook
webhooks:
- name: validate.kore.zjusct.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Ignore
  clientConfig:
    service:
      name: kore-webhook
      namespace: kore-system
      path: /validate-pod
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
