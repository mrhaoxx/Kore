# Kore Kueue AdmissionCheck 控制器：Kueue 准入 pin 作业前按整物理核确认分区放得下。
# 前置：集群已装 Kueue（提供 AdmissionCheck/Workload/ResourceFlavor CRD）。
# 分区侧（由 plat101/集群方在 partitions.yaml 做）：给需 pin 的 ClusterQueue 加
#   spec.admissionChecks: [kore-cores]
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: AdmissionCheck
metadata:
  name: kore-cores
spec:
  controllerName: kore.zjusct.io/admissioncheck
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kore-kueue-admissioncheck
  namespace: kore-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kore-kueue-admissioncheck
rules:
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["workloads"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["workloads/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["resourceflavors", "admissionchecks"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["kore.zjusct.io"]
  resources: ["korenodetopologies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kore-kueue-admissioncheck
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kore-kueue-admissioncheck
subjects:
- kind: ServiceAccount
  name: kore-kueue-admissioncheck
  namespace: kore-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kore-kueue-admissioncheck
  namespace: kore-system
spec:
  replicas: 1
  selector:
    matchLabels: { app: kore-kueue-admissioncheck }
  template:
    metadata:
      labels: { app: kore-kueue-admissioncheck }
    spec:
      serviceAccountName: kore-kueue-admissioncheck
      containers:
      - name: controller
        image: docker.io/mrhaoxx/kore-kueue-admissioncheck:v0.3.3   # 按实际镜像仓库修改
        args:
        - --check-name=kore-cores
        - --reservation-ttl=5m
