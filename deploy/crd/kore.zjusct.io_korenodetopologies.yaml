---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: korenodetopologies.kore.zjusct.io
spec:
  group: kore.zjusct.io
  names:
    kind: KoreNodeTopology
    listKind: KoreNodeTopologyList
    plural: korenodetopologies
    shortNames:
    - knt
    singular: korenodetopology
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KoreNodeTopology 由 kore-agent 维护（与节点同名），kore-scheduler 消费。
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          status:
            properties:
              allocations:
                items:
                  properties:
                    container:
                      type: string
                    cpuset:
                      type: string
                    numa:
                      items:
                        type: integer
                      type: array
                    pod:
                      description: Pod 格式为 namespace/name。
                      type: string
                    podUID:
                      type: string
                  required:
                  - container
                  - cpuset
                  - numa
                  - pod
                  - podUID
                  type: object
                type: array
              reservedSystemCpus:
                description: ReservedSystemCpus 是系统预留核（cpulist 语法，如 "0-1"）。
                type: string
              zones:
                items:
                  properties:
                    allocatable:
                      type: integer
                    cpus:
                      type: string
                    devices:
                      description: Devices 为 v2 预留（NPU/网卡 NUMA 归属）。
                      items:
                        properties:
                          name:
                            type: string
                          type:
                            type: string
                        required:
                        - name
                        - type
                        type: object
                      type: array
                    freeCpus:
                      type: string
                    id:
                      type: integer
                    memoryTotal:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    smtSiblings:
                      description: SMTSiblings 是本 zone 内的 sibling 组（无 SMT 则空）。
                      items:
                        items:
                          type: integer
                        type: array
                      type: array
                  required:
                  - allocatable
                  - cpus
                  - freeCpus
                  - id
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
