apiVersion: v1
kind: ConfigMap
metadata:
  name: kore-scheduler-config
  namespace: kore-system
data:
  config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: false
    profiles:
    - schedulerName: kore-scheduler
      plugins:
        multiPoint:
          enabled:
          - name: Kore
